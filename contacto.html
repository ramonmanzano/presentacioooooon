<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manzano Boxing - Contacto</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <nav>
            <div class="logo-container">
                <img src="imagenes/logo.png" alt="Logo" class="logo-img">
                <div class="logo-text">Manzano Boxing</div>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="servicios.html">Clases</a></li>
                <li><a href="contacto.html">Apuntarse</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Contacto</h1>
        <p>¿Tienes dudas? Rellena el formulario y nos pondremos en contacto contigo.</p>

        <!-- FORMULARIO DE CONTACTO: Usa el ID 'contactForm' para que JS pueda escucharlo -->
        <form id="contactForm">
            <div class="form-group">
                <label for="nombre">Nombre completo:</label>
                <!-- required: El navegador no deja enviar el formulario vacío -->
                <input type="text" id="nombre" required>
            </div>
            <div class="form-group">
                <label for="email">Correo electrónico:</label>
                <!-- type="email": Valida automáticamente que haya una @ y un dominio -->
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" rows="5" required></textarea>
            </div>
            <button type="submit">Enviar mensaje</button>
        </form>

        <!-- MENSAJE DE ÉXITO: Oculto por defecto (display:none), JS lo activa al validar -->
        <div id="success-msg" style="display:none; color: #2ecc71; margin-top: 20px; font-weight: bold;">
            ¡Mensaje enviado correctamente! Nos vemos en el ring.
        </div>
    </main>

    <footer>
        <p>Manzano Boxing Club - Proyecto Luis DAW</p>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
